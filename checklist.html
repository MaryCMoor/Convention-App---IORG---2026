<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#8b0000">
    <title>Checklist - NJ Rainbow Convention 2026</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .progress-banner {
            background: linear-gradient(135deg, var(--primary-gold), #b8960f);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            text-align: center;
            color: var(--dark-bg);
        }

        .progress-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: conic-gradient(var(--light-cream) 0deg, rgba(26, 5, 5, 0.3) 0deg);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 1rem auto;
            position: relative;
        }

        .progress-circle::before {
            content: '';
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--primary-gold);
            position: absolute;
        }

        .progress-text {
            font-size: 2.5rem;
            font-weight: bold;
            position: relative;
            z-index: 1;
        }

        .category-section {
            background: linear-gradient(135deg, rgba(220, 20, 60, 0.2), rgba(139, 0, 0, 0.2));
            border: 3px solid var(--primary-gold);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            cursor: pointer;
            user-select: none;
        }

        .category-title {
            color: var(--primary-gold);
            font-size: 1.5rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .category-progress {
            color: var(--light-cream);
            font-size: 1rem;
            font-weight: bold;
        }

        .category-items {
            display: grid;
            gap: 0.75rem;
        }

        .checklist-item {
            background: rgba(212, 175, 55, 0.1);
            border: 2px solid var(--primary-gold);
            border-radius: 8px;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.3s;
            cursor: pointer;
        }

        .checklist-item:hover {
            background: rgba(212, 175, 55, 0.2);
            transform: translateX(10px);
        }

        .checklist-item.checked {
            background: rgba(212, 175, 55, 0.3);
            border-color: var(--light-cream);
        }

        .checklist-item.checked .item-text {
            text-decoration: line-through;
            opacity: 0.7;
        }

        .checkbox {
            width: 30px;
            height: 30px;
            border: 3px solid var(--primary-gold);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
            transition: all 0.3s;
        }

        .checklist-item.checked .checkbox {
            background: var(--primary-gold);
            color: var(--dark-bg);
        }

        .item-text {
            color: var(--text-light);
            font-size: 1rem;
            flex: 1;
        }

        .custom-item-form {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .custom-item-form input {
            flex: 1;
        }

        .reset-btn {
            background: rgba(139, 0, 0, 0.3);
            border: 2px solid #dc143c;
            color: #dc143c;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-family: inherit;
        }

        .reset-btn:hover {
            background: #dc143c;
            color: white;
        }
    </style>
</head>
<body>
    <script>
        const currentUser = localStorage.getItem('currentUser');
        if (!currentUser) {
            window.location.href = 'login.html';
        }
    </script>

    <header class="app-header">
        <div style="display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; width: 100%;">
            <div>
                <h1>🎪 NJ RAINBOW CONVENTION 2026 🎪</h1>
                <div class="subtitle">✦ The Greatest Show on Earth ✦</div>
            </div>
            <button onclick="window.location.href='index.html'" class="back-btn" style="background: var(--primary-gold); color: var(--dark-bg);">
                ← Back to Home
            </button>
        </div>
    </header>

    <div class="content">
        <h2 class="section-title">✓ Convention Checklist ✓</h2>

        <!-- Progress Banner -->
        <div class="progress-banner">
            <h3 style="margin: 0 0 0.5rem 0; font-size: 1.5rem;">Your Packing Progress</h3>
            <div class="progress-circle" id="progressCircle">
                <div class="progress-text" id="progressText">0%</div>
            </div>
            <p style="margin: 0; font-weight: bold; font-size: 1.1rem;">
                <span id="checkedCount">0</span> of <span id="totalCount">0</span> items packed
            </p>
            <button class="reset-btn" onclick="resetChecklist()" style="margin-top: 1rem;">
                🔄 Reset All Items
            </button>
        </div>

        <!-- Checklist Categories -->
        <div id="checklistContainer">
            <!-- Categories loaded here -->
        </div>

        <!-- Add Custom Item -->
        <div class="category-section">
            <h3 class="category-title">➕ Add Custom Item</h3>
            <div class="custom-item-form">
                <input type="text" id="customItemText" placeholder="Enter custom item to pack...">
                <select id="customItemCategory">
                    <option value="Custom">Custom</option>
                    <option value="Clothing">Clothing</option>
                    <option value="Documents">Documents</option>
                    <option value="Personal Care">Personal Care</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Other">Other</option>
                </select>
                <button class="btn-save" onclick="addCustomItem()">Add</button>
            </div>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('currentUser') || '{}');
        const userId = user.userId;
        const GOOGLE_SHEETS_ID = '2PACX-1vTcWlhv_bK1thPxqX8ZaWaswTyaam1poIRptaJe-18E7IQbK39_ffnKvTUPtfeB8CiL5avfPgCoflCl';

        let allItems = [];
        let checkedItems = [];

        // Default checklist items
        const defaultItems = [
            { id: 1, text: 'Convention registration confirmation', category: 'Documents' },
            { id: 2, text: 'Photo ID / Driver\'s License', category: 'Documents' },
            { id: 3, text: 'Insurance card', category: 'Documents' },
            { id: 4, text: 'Emergency contact information', category: 'Documents' },
            { id: 5, text: 'White formal gown', category: 'Clothing' },
            { id: 6, text: 'Casual outfits for activities', category: 'Clothing' },
            { id: 7, text: 'Comfortable shoes', category: 'Clothing' },
            { id: 8, text: 'Pajamas', category: 'Clothing' },
            { id: 9, text: 'Undergarments and socks', category: 'Clothing' },
            { id: 10, text: 'Jacket or sweater', category: 'Clothing' },
            { id: 11, text: 'Toothbrush and toothpaste', category: 'Personal Care' },
            { id: 12, text: 'Shampoo and conditioner', category: 'Personal Care' },
            { id: 13, text: 'Deodorant', category: 'Personal Care' },
            { id: 14, text: 'Hair styling products', category: 'Personal Care' },
            { id: 15, text: 'Makeup and cosmetics', category: 'Personal Care' },
            { id: 16, text: 'Medications (if needed)', category: 'Personal Care' },
            { id: 17, text: 'Phone charger', category: 'Electronics' },
            { id: 18, text: 'Laptop/tablet (optional)', category: 'Electronics' },
            { id: 19, text: 'Camera', category: 'Electronics' },
            { id: 20, text: 'Headphones', category: 'Electronics' },
            { id: 21, text: 'Spending money', category: 'Other' },
            { id: 22, text: 'Snacks for travel', category: 'Other' },
            { id: 23, text: 'Water bottle', category: 'Other' },
            { id: 24, text: 'Notebook and pen', category: 'Other' },
            { id: 25, text: 'Rainbow pin/jewels', category: 'Other' }
        ];

        // Load checklist
        async function loadChecklist() {
            try {
                // Load from Google Sheets (Checklist tab)
                const response = await fetch(`https://docs.google.com/spreadsheets/d/e/${GOOGLE_SHEETS_ID}/pub?gid=3&single=true&output=csv`);
                const csvText = await response.text();
                const sheetItems = parseCSV(csvText);
                
                // Merge with default items
                allItems = sheetItems.length > 0 ? sheetItems : defaultItems;
            } catch (error) {
                console.error('Error loading checklist:', error);
                allItems = defaultItems;
            }
            
            // Load user's custom items
            const customItems = JSON.parse(localStorage.getItem(`checklist_custom_${userId}`) || '[]');
            allItems = [...allItems, ...customItems];
            
            // Load checked items
            checkedItems = JSON.parse(localStorage.getItem(`checklist_${userId}`) || '[]');
            
            renderChecklist();
        }

        // Parse CSV
        function parseCSV(csv) {
            const lines = csv.split('\n').filter(line => line.trim());
            if (lines.length < 2) return [];
            
            const headers = lines[0].split(',').map(h => h.trim());
            const items = [];
            
            for (let i = 1; i < lines.length; i++) {
                const values = lines[i].split(',').map(v => v.trim());
                const item = {};
                
                headers.forEach((header, index) => {
                    item[header] = values[index] || '';
                });
                
                if (item.text) {
                    items.push(item);
                }
            }
            
            return items;
        }

        // Toggle item
        function toggleItem(itemId) {
            if (checkedItems.includes(itemId)) {
                checkedItems = checkedItems.filter(id => id !== itemId);
            } else {
                checkedItems.push(itemId);
            }
            
            localStorage.setItem(`checklist_${userId}`, JSON.stringify(checkedItems));
            renderChecklist();
        }

        // Render checklist
        function renderChecklist() {
            const container = document.getElementById('checklistContainer');
            
            // Group by category
            const categories = {};
            allItems.forEach(item => {
                const cat = item.category || 'Other';
                if (!categories[cat]) {
                    categories[cat] = [];
                }
                categories[cat].push(item);
            });
            
            // Category icons
            const categoryIcons = {
                'Documents': '📄',
                'Clothing': '👗',
                'Personal Care': '🧴',
                'Electronics': '🔌',
                'Other': '📦',
                'Custom': '✨'
            };
            
            // Render categories
            let html = '';
            Object.keys(categories).forEach(category => {
                const items = categories[category];
                const checkedCount = items.filter(item => checkedItems.includes(item.id || item.text)).length;
                const icon = categoryIcons[category] || '📦';
                
                html += `
                    <div class="category-section">
                        <div class="category-header" onclick="toggleCategory(this)">
                            <h3 class="category-title">
                                ${icon} ${category}
                            </h3>
                            <div class="category-progress">
                                ${checkedCount} / ${items.length}
                            </div>
                        </div>
                        <div class="category-items">
                `;
                
                items.forEach(item => {
                    const itemId = item.id || item.text;
                    const isChecked = checkedItems.includes(itemId);
                    
                    html += `
                        <div class="checklist-item ${isChecked ? 'checked' : ''}" onclick="toggleItem('${itemId}')">
                            <div class="checkbox">
                                ${isChecked ? '✓' : ''}
                            </div>
                            <div class="item-text">${item.text}</div>
                        </div>
                    `;
                });
                
                html += `
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            updateProgress();
        }

        // Update progress
        function updateProgress() {
            const total = allItems.length;
            const checked = allItems.filter(item => checkedItems.includes(item.id || item.text)).length;
            const percentage = total > 0 ? Math.round((checked / total) * 100) : 0;
            
            document.getElementById('progressText').textContent = percentage + '%';
            document.getElementById('checkedCount').textContent = checked;
            document.getElementById('totalCount').textContent = total;
            
            // Update progress circle
            const circle = document.getElementById('progressCircle');
            const degrees = (percentage / 100) * 360;
            circle.style.background = `conic-gradient(var(--light-cream) ${degrees}deg, rgba(26, 5, 5, 0.3) ${degrees}deg)`;
        }

        // Toggle category collapse
        function toggleCategory(header) {
            const items = header.nextElementSibling;
            items.style.display = items.style.display === 'none' ? 'grid' : 'none';
        }

        // Add custom item
        function addCustomItem() {
            const text = document.getElementById('customItemText').value.trim();
            const category = document.getElementById('customItemCategory').value;
            
            if (!text) {
                alert('Please enter an item to add.');
                return;
            }
            
            const customItems = JSON.parse(localStorage.getItem(`checklist_custom_${userId}`) || '[]');
            const newId = 'custom_' + Date.now();
            
            customItems.push({
                id: newId,
                text: text,
                category: category
            });
            
            localStorage.setItem(`checklist_custom_${userId}`, JSON.stringify(customItems));
            
            document.getElementById('customItemText').value = '';
            loadChecklist();
            
            alert('✅ Custom item added!');
        }

        // Reset checklist
        function resetChecklist() {
            if (!confirm('Are you sure you want to uncheck all items? This cannot be undone.')) {
                return;
            }
            
            checkedItems = [];
            localStorage.setItem(`checklist_${userId}`, JSON.stringify(checkedItems));
            renderChecklist();
            
            alert('✅ Checklist reset!');
        }

        // Initialize
        loadChecklist();
    </script>
</body>
</html>
