<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#8b0000">
    <title>Speakers - NJ Rainbow Convention 2026</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .speakers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .speaker-card {
            background: linear-gradient(135deg, rgba(220, 20, 60, 0.3), rgba(139, 0, 0, 0.3));
            border: 3px solid var(--primary-gold);
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .speaker-card::before {
            content: '🎤';
            position: absolute;
            top: -20px;
            right: -20px;
            font-size: 8rem;
            opacity: 0.1;
            transform: rotate(-15deg);
        }

        .speaker-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 16px 40px rgba(212, 175, 55, 0.6);
            border-color: var(--light-cream);
        }

        .speaker-photo {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 5px solid var(--primary-gold);
            object-fit: cover;
            margin: 0 auto 1.5rem;
            display: block;
            position: relative;
            z-index: 1;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .speaker-photo-placeholder {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 5px solid var(--primary-gold);
            background: linear-gradient(135deg, var(--primary-gold), #b8960f);
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            position: relative;
            z-index: 1;
        }

        .speaker-name {
            color: var(--primary-gold);
            font-size: 1.6rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 1;
        }

        .speaker-title {
            color: var(--light-cream);
            font-size: 1.1rem;
            font-style: italic;
            margin-bottom: 1rem;
            position: relative;
            z-index: 1;
        }

        .speaker-event {
            background: var(--primary-gold);
            color: var(--dark-bg);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 1rem;
            position: relative;
            z-index: 1;
        }

        .speaker-bio {
            color: var(--text-light);
            line-height: 1.6;
            font-size: 0.95rem;
            position: relative;
            z-index: 1;
            text-align: left;
        }

        .no-speakers {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-light);
        }

        .no-speakers-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
        }

        .search-box {
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <script>
        const currentUser = localStorage.getItem('currentUser');
        if (!currentUser) {
            window.location.href = 'login.html';
        }
    </script>

    <header class="app-header">
        <div style="display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; width: 100%;">
            <div>
                <h1>🎪 NJ RAINBOW CONVENTION 2026 🎪</h1>
                <div class="subtitle">✦ The Greatest Show on Earth ✦</div>
            </div>
            <button onclick="window.location.href='index.html'" class="back-btn" style="background: var(--primary-gold); color: var(--dark-bg);">
                ← Back to Home
            </button>
        </div>
    </header>

    <div class="content">
        <h2 class="section-title">🎤 Featured Speakers 🎤</h2>
        <p style="text-align: center; color: var(--text-light); margin-bottom: 2rem;">
            Meet the inspiring speakers who will be sharing their wisdom and experiences!
        </p>

        <!-- Search Box -->
        <div class="search-box">
            <input type="text" id="speakerSearch" placeholder="🔍 Search speakers by name or event...">
        </div>

        <!-- Speakers Grid -->
        <div id="speakersContainer" class="speakers-grid">
            <!-- Speakers loaded here -->
        </div>

        <!-- No Speakers State -->
        <div id="noSpeakers" class="no-speakers" style="display: none;">
            <div class="no-speakers-icon">🎤</div>
            <h3 style="color: var(--primary-gold);">No Speakers Found</h3>
            <p>Check back soon to learn about our amazing speakers!</p>
        </div>
    </div>

    <script>
        const GOOGLE_SHEETS_ID = '2PACX-1vTcWlhv_bK1thPxqX8ZaWaswTyaam1poIRptaJe-18E7IQbK39_ffnKvTUPtfeB8CiL5avfPgCoflCl';
        
        let allSpeakers = [];

        // Load speakers from Google Sheets + Admin
        async function loadSpeakers() {
            try {
                // Load from Google Sheets (Speakers tab - gid may vary)
                const response = await fetch(`https://docs.google.com/spreadsheets/d/e/${GOOGLE_SHEETS_ID}/pub?gid=2&single=true&output=csv`);
                const csvText = await response.text();
                const sheetSpeakers = parseCSV(csvText);
                
                // Load admin-added speakers
                const adminSpeakers = JSON.parse(localStorage.getItem('admin_speakers') || '[]');
                
                // Merge speakers
                allSpeakers = [...sheetSpeakers, ...adminSpeakers];
                
                renderSpeakers();
            } catch (error) {
                console.error('Error loading speakers:', error);
                
                // Fallback to admin speakers only
                allSpeakers = JSON.parse(localStorage.getItem('admin_speakers') || '[]');
                renderSpeakers();
            }
        }

        // Parse CSV from Google Sheets
        function parseCSV(csv) {
            const lines = csv.split('\n').filter(line => line.trim());
            if (lines.length < 2) return [];
            
            const headers = lines[0].split(',').map(h => h.trim());
            const speakers = [];
            
            for (let i = 1; i < lines.length; i++) {
                const values = lines[i].split(',').map(v => v.trim());
                const speaker = {};
                
                headers.forEach((header, index) => {
                    speaker[header] = values[index] || '';
                });
                
                if (speaker.name) {
                    speakers.push(speaker);
                }
            }
            
            return speakers;
        }

        // Render speakers
        function renderSpeakers() {
            const container = document.getElementById('speakersContainer');
            const noSpeakersDiv = document.getElementById('noSpeakers');
            
            // Apply search filter
            const searchTerm = document.getElementById('speakerSearch').value.toLowerCase();
            let filteredSpeakers = allSpeakers;
            
            if (searchTerm) {
                filteredSpeakers = allSpeakers.filter(s => 
                    s.name.toLowerCase().includes(searchTerm) ||
                    (s.title && s.title.toLowerCase().includes(searchTerm)) ||
                    (s.event && s.event.toLowerCase().includes(searchTerm)) ||
                    (s.bio && s.bio.toLowerCase().includes(searchTerm))
                );
            }
            
            if (filteredSpeakers.length === 0) {
                container.innerHTML = '';
                noSpeakersDiv.style.display = 'block';
                return;
            }
            
            noSpeakersDiv.style.display = 'none';
            
            container.innerHTML = filteredSpeakers.map(speaker => `
                <div class="speaker-card">
                    ${speaker.photo ? 
                        `<img src="${speaker.photo}" alt="${speaker.name}" class="speaker-photo">` :
                        `<div class="speaker-photo-placeholder">🎤</div>`
                    }
                    
                    <h3 class="speaker-name">${speaker.name}</h3>
                    
                    ${speaker.title ? 
                        `<div class="speaker-title">${speaker.title}</div>` : ''
                    }
                    
                    ${speaker.event ? 
                        `<div class="speaker-event">🎪 ${speaker.event}</div>` : ''
                    }
                    
                    ${speaker.bio ? 
                        `<div class="speaker-bio">${speaker.bio}</div>` : ''
                    }
                </div>
            `).join('');
        }

        // Search functionality
        document.getElementById('speakerSearch').addEventListener('input', () => {
            renderSpeakers();
        });

        // Initialize
        loadSpeakers();
    </script>
</body>
</html>
