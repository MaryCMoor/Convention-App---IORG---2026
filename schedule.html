<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#8b0000">
    <title>Schedule - NJ Rainbow Convention 2026</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .day-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            overflow-x: auto;
        }

        .day-tab {
            flex: 1;
            padding: 1rem;
            background: rgba(212, 175, 55, 0.2);
            border: 3px solid var(--primary-gold);
            border-radius: 12px;
            color: var(--primary-gold);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-family: inherit;
        }

        .day-tab.active {
            background: var(--primary-gold);
            color: var(--dark-bg);
            transform: scale(1.05);
        }

        .timeline {
            position: relative;
            padding-left: 2rem;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--primary-gold);
        }

        .timeline-item {
            position: relative;
            margin-bottom: 1.5rem;
            padding-left: 1.5rem;
        }

        .timeline-item::before {
            content: '⭐';
            position: absolute;
            left: -2.5rem;
            top: 0.5rem;
            font-size: 1.5rem;
        }

        .event-card {
            background: linear-gradient(135deg, rgba(220, 20, 60, 0.3), rgba(139, 0, 0, 0.3));
            border: 3px solid var(--primary-gold);
            border-radius: 12px;
            padding: 1.5rem;
            position: relative;
            transition: all 0.3s;
        }

        .event-card:hover {
            transform: translateX(10px);
            box-shadow: 0 8px 24px rgba(212, 175, 55, 0.4);
        }

        .event-card.favorited {
            border-color: #dc143c;
            box-shadow: 0 0 20px rgba(220, 20, 60, 0.5);
        }

        .event-time {
            color: var(--primary-gold);
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .event-title {
            color: white;
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .event-meta {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 0.75rem;
        }

        .event-description {
            color: var(--text-light);
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .favorite-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(212, 175, 55, 0.2);
            border: 2px solid var(--primary-gold);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .favorite-btn:hover {
            background: var(--primary-gold);
            transform: scale(1.1);
        }

        .favorite-btn.favorited {
            background: #dc143c;
            border-color: #dc143c;
            animation: heartbeat 1s ease-in-out;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .event-type-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: var(--primary-gold);
            color: var(--dark-bg);
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-right: 0.5rem;
        }
    </style>
</head>
<body>
    <script>
        const currentUser = localStorage.getItem('currentUser');
        if (!currentUser) {
            window.location.href = 'login.html';
        }
    </script>

    <header class="app-header">
        <div style="display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; width: 100%;">
            <div>
                <h1>🎪 NJ RAINBOW CONVENTION 2026 🎪</h1>
                <div class="subtitle">✦ The Greatest Show on Earth ✦</div>
            </div>
            <button onclick="window.location.href='index.html'" class="back-btn" style="background: var(--primary-gold); color: var(--dark-bg);">
                ← Back to Home
            </button>
        </div>
    </header>

    <div class="content">
        <h2 class="section-title">📅 Convention Schedule 📅</h2>

        <div class="day-tabs">
            <button class="day-tab active" onclick="filterByDay('All', this)">🎪 All Days</button>
            <button class="day-tab" onclick="filterByDay('Friday', this)">📅 Friday</button>
            <button class="day-tab" onclick="filterByDay('Saturday', this)">📅 Saturday</button>
            <button class="day-tab" onclick="filterByDay('Sunday', this)">📅 Sunday</button>
        </div>

        <div id="scheduleContainer">
            <!-- Schedule loaded here -->
        </div>

        <div id="noEvents" style="display: none; text-align: center; padding: 3rem; color: var(--text-light);">
            <div style="font-size: 4rem; margin-bottom: 1rem;">📅</div>
            <h3 style="color: var(--primary-gold);">No Events Found</h3>
            <p>No events scheduled for this day yet.</p>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('currentUser') || '{}');
        const userId = user.userId;
        
        // Published CSV URL for Events sheet with correct gid
        const EVENTS_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTcWlhv_bK1thPxqX8ZaWaswTyaam1poIRptaJe-18E7IQbK39_ffnKvTUPtfeB8CiL5avfPgCoflCl/pub?gid=98461157&single=true&output=csv';

        let allEvents = [];
        let currentFilter = 'All';

        // Parse CSV helper
        function parseCSV(text) {
            const rows = [];
            let currentRow = [];
            let currentField = '';
            let inQuotes = false;
            
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i + 1];
                
                if (char === '"') {
                    if (inQuotes && nextChar === '"') {
                        currentField += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    currentRow.push(currentField.trim());
                    currentField = '';
                } else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (currentField || currentRow.length > 0) {
                        currentRow.push(currentField.trim());
                        rows.push(currentRow);
                        currentRow = [];
                        currentField = '';
                    }
                    if (char === '\r' && nextChar === '\n') {
                        i++;
                    }
                } else {
                    currentField += char;
                }
            }
            
            if (currentField || currentRow.length > 0) {
                currentRow.push(currentField.trim());
                rows.push(currentRow);
            }
            
            return rows;
        }

        // Load events from published Google Sheets CSV
        async function loadEvents() {
            try {
                console.log('📥 Loading events from Google Sheets CSV...');
                
                const response = await fetch(EVENTS_CSV_URL);
                const csvText = await response.text();
                
                console.log('📄 CSV received, parsing...');
                
                const rows = parseCSV(csvText);
                
                if (rows.length === 0) {
                    console.log('⚠️ No rows found in CSV');
                    allEvents = JSON.parse(localStorage.getItem('events') || '[]');
                    renderSchedule();
                    return;
                }
                
                console.log('📊 Found ' + rows.length + ' rows');
                console.log('Headers:', rows[0]);
                
                const headers = rows[0].map(h => h.toLowerCase().trim());
                allEvents = [];
                
                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    
                    // Skip empty rows
                    if (!row || row.length === 0 || !row.join('').trim()) continue;
                    
                    const event = {};
                    
                    headers.forEach((header, index) => {
                        event[header] = row[index] || '';
                    });
                    
                    // Only add if has title and day
                    if (event.title && event.day) {
                        // Use eventid or eventId or id
                        event.id = event.eventid || event.eventId || event.id || Date.now() + i;
                        allEvents.push(event);
                    }
                }
                
                console.log('✅ Loaded ' + allEvents.length + ' events from Google Sheets');
                
            } catch (error) {
                console.error('❌ Error loading from Google Sheets:', error);
                console.log('⚠️ Falling back to localStorage');
                allEvents = JSON.parse(localStorage.getItem('events') || '[]');
            }
            
            renderSchedule();
        }

        // Get user's favorites
        function getFavorites() {
            return JSON.parse(localStorage.getItem(`favorites_${userId}`) || '[]');
        }

        // Toggle favorite
        function toggleFavorite(eventId) {
            let favorites = getFavorites();
            
            const index = favorites.findIndex(id => id === eventId || id == eventId || String(id) === String(eventId));
            if (index > -1) {
                favorites.splice(index, 1);
            } else {
                favorites.push(eventId);
            }
            
            localStorage.setItem(`favorites_${userId}`, JSON.stringify(favorites));
            renderSchedule();
        }

        // Filter by day
        function filterByDay(day, buttonElement) {
            currentFilter = day;
            
            // Update active tab
            const tabs = document.querySelectorAll('.day-tab');
            tabs.forEach(tab => tab.classList.remove('active'));
            if (buttonElement) buttonElement.classList.add('active');
            
            renderSchedule();
        }

        // Render schedule
        function renderSchedule() {
            const container = document.getElementById('scheduleContainer');
            const noEvents = document.getElementById('noEvents');
            const favorites = getFavorites();
            
            console.log('🎨 Rendering schedule with ' + allEvents.length + ' events');
            
            // Filter events
            let filteredEvents = allEvents;
            if (currentFilter !== 'All') {
                filteredEvents = allEvents.filter(e => e.day === currentFilter);
            }
            
            if (filteredEvents.length === 0) {
                container.innerHTML = '';
                noEvents.style.display = 'block';
                return;
            }
            
            noEvents.style.display = 'none';
            
            // Organize by day
            const byDay = {
                'Friday': [],
                'Saturday': [],
                'Sunday': []
            };
            
            filteredEvents.forEach(event => {
                if (byDay[event.day]) {
                    byDay[event.day].push(event);
                }
            });
            
            // Sort events by time within each day
            Object.keys(byDay).forEach(day => {
                byDay[day].sort((a, b) => {
                    const timeA = convertTo24Hour(a.time);
                    const timeB = convertTo24Hour(b.time);
                    return timeA.localeCompare(timeB);
                });
            });
            
            // Render HTML
            let html = '';
            
            Object.keys(byDay).forEach(day => {
                if (byDay[day].length > 0) {
                    html += `
                        <h3 style="color: var(--primary-gold); margin: 2rem 0 1rem; font-size: 1.8rem;">
                            ${day === 'Friday' ? '🎉' : day === 'Saturday' ? '🌟' : '✨'} ${day}
                        </h3>
                        <div class="timeline">
                    `;
                    
                    byDay[day].forEach(event => {
                        const eventId = event.id || event.eventid || event.eventId;
                        const isFavorited = favorites.some(fav => String(fav) === String(eventId));
                        
                        html += `
                            <div class="timeline-item">
                                <div class="event-card ${isFavorited ? 'favorited' : ''}">
                                    <button class="favorite-btn ${isFavorited ? 'favorited' : ''}" 
                                            onclick="toggleFavorite('${eventId}')">
                                        ${isFavorited ? '⭐' : '☆'}
                                    </button>
                                    
                                    <div class="event-time">
                                        ⏰ ${escapeHtml(event.time)}${event.timeend || event.timeEnd ? ' - ' + escapeHtml(event.timeend || event.timeEnd) : ''}
                                    </div>
                                    
                                    <div class="event-title">${escapeHtml(event.title)}</div>
                                    
                                    <div class="event-meta">
                                        ${event.type ? `<span class="event-type-badge">${escapeHtml(event.type)}</span>` : ''}
                                        ${event.location ? `📍 ${escapeHtml(event.location)}` : ''}
                                        ${event.speaker ? ` | 🎤 ${escapeHtml(event.speaker)}` : ''}
                                    </div>
                                    
                                    ${event.description ? `
                                        <div class="event-description">${escapeHtml(event.description)}</div>
                                    ` : ''}
                                </div>
                            </div>
                        `;
                    });
                    
                    html += `</div>`;
                }
            });
            
            container.innerHTML = html;
        }

        // Convert time to 24-hour format for sorting
        function convertTo24Hour(time) {
            if (!time) return '00:00';
            
            const match = time.match(/(\d+):(\d+)\s*(AM|PM)/i);
            if (!match) return time;
            
            let hours = parseInt(match[1]);
            const minutes = match[2];
            const period = match[3].toUpperCase();
            
            if (period === 'PM' && hours !== 12) {
                hours += 12;
            } else if (period === 'AM' && hours === 12) {
                hours = 0;
            }
            
            return `${hours.toString().padStart(2, '0')}:${minutes}`;
        }

        // Escape HTML
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize
        loadEvents();
    </script>
</body>
</html>
