<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#8b0000">
    <title>Login - NJ Rainbow Convention 2026</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            background: var(--dark-bg);
        }

        .login-box {
            background: linear-gradient(135deg, var(--card-gradient-start), var(--card-gradient-end));
            border: 4px solid var(--primary-gold);
            border-radius: 20px;
            padding: 3rem 2rem;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            font-size: 2rem;
            color: var(--primary-gold);
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .circus-emoji {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .login-header p {
            color: var(--text-light);
            font-size: 1rem;
        }

        .form-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .form-tab {
            flex: 1;
            padding: 0.75rem;
            background: rgba(212, 175, 55, 0.2);
            border: 2px solid var(--primary-gold);
            border-radius: 8px;
            color: var(--primary-gold);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .form-tab.active {
            background: var(--primary-gold);
            color: var(--dark-bg);
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            color: var(--primary-gold);
            font-weight: bold;
            margin-bottom: 0.5rem;
            font-size: 1rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid var(--primary-gold);
            border-radius: 8px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.95);
            color: var(--text-dark);
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--light-cream);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.3);
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: var(--primary-gold);
            color: var(--dark-bg);
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .submit-btn:hover {
            background: var(--light-cream);
            transform: scale(1.02);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-message {
            background: rgba(255, 0, 0, 0.2);
            border: 2px solid #ff0000;
            color: #ff6666;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }

        .success-message {
            background: rgba(0, 255, 0, 0.2);
            border: 2px solid #00ff00;
            color: #66ff66;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <div class="circus-emoji">🎪</div>
                <h1>Welcome to the Show!</h1>
                <p>NJ Rainbow Convention 2026</p>
            </div>

            <div class="form-tabs">
                <div class="form-tab active" onclick="switchTab('login')">Login</div>
                <div class="form-tab" onclick="switchTab('signup')">Sign Up</div>
            </div>

            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>

            <!-- LOGIN FORM -->
            <form id="loginForm" class="auth-form active" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label>📧 Email or Username</label>
                    <input type="text" id="loginUsername" placeholder="Enter your email or username" required>
                </div>
                <div class="form-group">
                    <label>🔒 Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="submit-btn">🎭 Enter the Show</button>
            </form>

            <!-- SIGNUP FORM -->
            <form id="signupForm" class="auth-form" onsubmit="return handleSignup(event)">
                <div class="form-group">
                    <label>📛 Full Name</label>
                    <input type="text" id="signupName" placeholder="Your full name" required>
                </div>
                <div class="form-group">
                    <label>📧 Email</label>
                    <input type="email" id="signupEmail" placeholder="your.email@example.com" required>
                </div>
                <div class="form-group">
                    <label>👤 Username</label>
                    <input type="text" id="signupUsername" placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label>👥 I am a...</label>
                    <select id="signupRole" required>
                        <option value="">Select your role</option>
                        <option value="Rainbow">Rainbow Girl</option>
                        <option value="DeMolay">DeMolay</option>
                        <option value="Mason">Mason</option>
                        <option value="Eastern Star">Eastern Star</option>
                        <option value="Amaranth">Order of Amaranth</option>
                        <option value="Grand Officer">Grand Officer</option>
                        <option value="Advisor">Advisor</option>
                        <option value="Parent">Parent/Guardian</option>
                        <option value="Admin">Admin</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>🔒 Password</label>
                    <input type="password" id="signupPassword" placeholder="Choose a password (min 6 characters)" required minlength="6">
                </div>
                <div class="form-group">
                    <label>🔒 Confirm Password</label>
                    <input type="password" id="signupConfirmPassword" placeholder="Confirm your password" required>
                </div>
                <button type="submit" class="submit-btn">🌈 Join the Convention</button>
            </form>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
