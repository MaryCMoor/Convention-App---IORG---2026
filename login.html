<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#8b0000">
    <title>Login - NJ Rainbow Convention 2026</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <header class="app-header">
        <h1>🎪 NJ RAINBOW CONVENTION 2026 🎪</h1>
        <div class="subtitle">✦ Welcome ✦</div>
    </header>

    <div class="content" style="max-width: 500px; margin: 2rem auto;">
        <!-- LOGIN FORM -->
        <div id="loginForm" class="auth-form">
            <h2 class="section-title">🔐 Login</h2>
            
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter your username">
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password">
            </div>
            
            <button onclick="login()" class="btn-save" style="width: 100%;">
                🔓 Login
            </button>
            
            <div style="text-align: center; margin-top: 1.5rem;">
                <p style="color: var(--text-light);">Don't have an account?</p>
                <button onclick="showSignup()" class="btn-secondary" style="margin-top: 0.5rem;">
                    ➕ Create New Account
                </button>
            </div>
        </div>

        <!-- SIGNUP FORM -->
        <div id="signupForm" class="auth-form" style="display: none;">
            <h2 class="section-title">📝 Create Account</h2>
            
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" id="signupName" placeholder="Your full name">
            </div>
            
            <div class="form-group">
                <label>Username *</label>
                <input type="text" id="signupUsername" placeholder="Choose a username">
            </div>
            
            <div class="form-group">
                <label>Email Address *</label>
                <input type="email" id="signupEmail" placeholder="your.email@example.com">
            </div>
            
            <div class="form-group">
                <label>Password *</label>
                <input type="password" id="signupPassword" placeholder="At least 6 characters">
            </div>
            
            <div class="form-group">
                <label>Confirm Password *</label>
                <input type="password" id="signupConfirmPassword" placeholder="Re-enter password">
            </div>
            
            <div class="form-group">
                <label>Select Your Role(s) *</label>
                <p style="color: var(--text-light); font-size: 0.85rem; margin-bottom: 0.5rem;">
                    You can select multiple roles that apply to you.
                </p>
                <div id="roleCheckboxes" style="display: grid; grid-template-columns: 1fr; gap: 0.5rem; max-height: 300px; overflow-y: auto; padding: 0.5rem; background: rgba(0,0,0,0.2); border-radius: 8px;">
                    <!-- Roles loaded dynamically by auth.js -->
                </div>
            </div>
            
            <button onclick="signup()" class="btn-save" style="width: 100%;">
                ✅ Create Account
            </button>
            
            <div style="text-align: center; margin-top: 1.5rem;">
                <p style="color: var(--text-light);">Already have an account?</p>
                <button onclick="showLogin()" class="btn-secondary" style="margin-top: 0.5rem;">
                    🔐 Back to Login
                </button>
            </div>
        </div>
    </div>

    <script src="auth.js?v=5"></script>
</body>
</html>
