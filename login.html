<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#8b0000">
    <title>Login - NJ Rainbow Convention 2026</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <header class="app-header">
        <h1>🎪 NJ RAINBOW CONVENTION 2026 🎪</h1>
        <div class="subtitle">✦ Welcome ✦</div>
    </header>

    <div class="content" style="max-width: 500px; margin: 2rem auto;">
        <!-- LOGIN FORM -->
        <div id="loginForm" class="auth-form">
            <h2 class="section-title">🔐 Login</h2>
            
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="loginUsername" placeholder="Enter your username" required>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" required>
                </div>
                
                <button type="submit" class="btn-save" style="width: 100%;">
                    🔓 Login
                </button>
            </form>
            
            <div style="text-align: center; margin-top: 1.5rem;">
                <p style="color: var(--text-light);">Don't have an account?</p>
                <button onclick="showSignup()" class="btn-secondary" style="margin-top: 0.5rem;">
                    ➕ Create New Account
                </button>
            </div>
        </div>

        <!-- SIGNUP FORM -->
        <div id="signupForm" class="auth-form" style="display: none;">
            <h2 class="section-title">📝 Create Account</h2>
            
            <form onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="signupName" placeholder="Your full name" required>
                </div>
                
                <div class="form-group">
                    <label>Username *</label>
                    <input type="text" id="signupUsername" placeholder="Choose a username" required>
                </div>
                
                <div class="form-group">
                    <label>Email Address *</label>
                    <input type="email" id="signupEmail" placeholder="your.email@example.com" required>
                </div>
                
                <div class="form-group">
                    <label>Password *</label>
                    <input type="password" id="signupPassword" placeholder="At least 6 characters" required>
                </div>
                
                <div class="form-group">
                    <label>Confirm Password *</label>
                    <input type="password" id="signupConfirmPassword" placeholder="Re-enter password" required>
                </div>
                
                <div class="form-group">
                    <label>Select Your Role(s) *</label>
                    <p style="color: var(--text-light); font-size: 0.85rem; margin-bottom: 0.5rem;">
                        You can select multiple roles that apply to you.
                    </p>
                    <div id="roleCheckboxes" style="display: grid; grid-template-columns: 1fr; gap: 0.5rem; max-height: 300px; overflow-y: auto; padding: 0.5rem; background: rgba(0,0,0,0.2); border-radius: 8px;">
                        <label style="display: flex; align-items: center; padding: 0.5rem; cursor: pointer;">
                            <input type="checkbox" name="role" value="Rainbow Girl" style="margin-right: 0.5rem;">
                            <span>Rainbow Girl</span>
                        </label>
                        <label style="display: flex; align-items: center; padding: 0.5rem; cursor: pointer;">
                            <input type="checkbox" name="role" value="Grand Officer" style="margin-right: 0.5rem;">
                            <span>Grand Officer</span>
                        </label>
                        <label style="display: flex; align-items: center; padding: 0.5rem; cursor: pointer;">
                            <input type="checkbox" name="role" value="Mother Advisor" style="margin-right: 0.5rem;">
                            <span>Mother Advisor</span>
                        </label>
                        <label style="display: flex; align-items: center; padding: 0.5rem; cursor: pointer;">
                            <input type="checkbox" name="role" value="Advisory Board" style="margin-right: 0.5rem;">
                            <span>Advisory Board Member</span>
                        </label>
                        <label style="display: flex; align-items: center; padding: 0.5rem; cursor: pointer;">
                            <input type="checkbox" name="role" value="Supreme Officer" style="margin-right: 0.5rem;">
                            <span>Supreme Officer</span>
                        </label>
                        <label style="display: flex; align-items: center; padding: 0.5rem; cursor: pointer;">
                            <input type="checkbox" name="role" value="Past Grand Officer" style="margin-right: 0.5rem;">
                            <span>Past Grand Officer</span>
                        </label>
                        <label style="display: flex; align-items: center; padding: 0.5rem; cursor: pointer;">
                            <input type="checkbox" name="role" value="Visitor" style="margin-right: 0.5rem;">
                            <span>Visitor</span>
                        </label>
                    </div>
                </div>
                
                <button type="submit" class="btn-save" style="width: 100%;">
                    ✅ Create Account
                </button>
            </form>
            
            <div style="text-align: center; margin-top: 1.5rem;">
                <p style="color: var(--text-light);">Already have an account?</p>
                <button onclick="showLogin()" class="btn-secondary" style="margin-top: 0.5rem;">
                    🔐 Back to Login
                </button>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        console.log('========================================');
        console.log('📄 login.html loaded');
        console.log('========================================');
        
        function showSignup() {
            console.log('🔄 Switching to signup form');
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('signupForm').style.display = 'block';
        }
        
        function showLogin() {
            console.log('🔄 Switching to login form');
            document.getElementById('signupForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
        }
        
        function handleLogin(event) {
            event.preventDefault();
            console.log('🔐 Login form submitted');
            
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            console.log('Attempting login for:', username);
            
            if (login(username, password)) {
                console.log('✅ Login successful');
                
                if (needsTraining()) {
                    console.log('➡️ New user - redirecting to welcome tutorial...');
                    window.location.href = 'welcome-tutorial.html';
                } else {
                    console.log('➡️ Returning user - redirecting to index...');
                    window.location.href = 'index.html';
                }
            } else {
                console.error('❌ Login failed');
                alert('Invalid username or password');
            }
        }
        
        async function handleSignup(event) {
            event.preventDefault();
            console.log('========================================');
            console.log('📝 Signup form submitted');
            console.log('========================================');
            
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const username = document.getElementById('signupUsername').value;
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('signupConfirmPassword').value;
            
            console.log('📋 Form data collected:');
            console.log('  Name:', name);
            console.log('  Email:', email);
            console.log('  Username:', username);
            console.log('  Password length:', password.length);
            
            // Get selected roles
            const roleCheckboxes = document.querySelectorAll('input[name="role"]:checked');
            console.log('📋 Roles checked:', roleCheckboxes.length);
            
            if (roleCheckboxes.length === 0) {
                console.error('❌ No roles selected');
                alert('Please select at least one role!');
                return;
            }
            
            const roles = Array.from(roleCheckboxes).map(cb => cb.value);
            const role = roles.join(', ');
            console.log('📋 Combined role:', role);
            
            // Validate passwords
            if (password !== confirmPassword) {
                console.error('❌ Passwords do not match');
                alert('Passwords do not match!');
                return;
            }
            
            if (password.length < 6) {
                console.error('❌ Password too short');
                alert('Password must be at least 6 characters long!');
                return;
            }
            
            console.log('✅ All validation passed');
            
            // Check if signUp function exists
            if (typeof signUp !== 'function') {
                console.error('❌❌❌ signUp function not found!');
                console.error('auth.js is not loaded properly!');
                alert('Error: Authentication system not loaded. Please refresh the page.');
                return;
            }
            
            console.log('✅ signUp function found, calling it now...');
            
            try {
                const success = await signUp(username, email, name, role, password);
                console.log('📥 signUp returned:', success);
                
                if (success) {
                    console.log('✅✅✅ Signup successful!');
                    console.log('➡️ Redirecting to welcome tutorial...');
                    window.location.href = 'welcome-tutorial.html';
                } else {
                    console.error('❌ Signup returned false');
                }
            } catch (error) {
                console.error('❌❌❌ Exception in handleSignup:');
                console.error(error);
                alert('An error occurred during signup. Check console for details.');
            }
        }

        // If already logged in, redirect
        if (isLoggedIn()) {
            console.log('✅ User already logged in');
            if (needsTraining()) {
                console.log('➡️ User needs training, redirecting...');
                window.location.href = 'welcome-tutorial.html';
            } else {
                console.log('➡️ Redirecting to index...');
                window.location.href = 'index.html';
            }
        } else {
            console.log('ℹ️ User not logged in, showing login form');
        }
    </script>
</body>
</html>
