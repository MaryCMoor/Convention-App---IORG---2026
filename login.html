<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NJ Rainbow Convention 2026</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>🎪 NJ Rainbow Convention 2026</h1>
            <p class="tagline">Welcome! Please sign in or create an account.</p>
            
            <!-- Login Form -->
            <div id="loginForm" class="form-container">
                <h2>Sign In</h2>
                <form onsubmit="handleLogin(event)">
                    <input type="text" id="loginUsername" placeholder="Username or Email" required>
                    <input type="password" id="loginPassword" placeholder="Password" required>
                    <button type="submit" class="btn-primary">Sign In</button>
                </form>
                <p class="switch-form">
                    Don't have an account? 
                    <a href="#" onclick="showSignup(); return false;">Create Account</a>
                </p>
            </div>
            
            <!-- Signup Form -->
            <div id="signupForm" class="form-container" style="display: none;">
                <h2>Create Account</h2>
                <form onsubmit="handleSignup(event)">
                    <input type="text" id="signupName" placeholder="Full Name" required>
                    <input type="email" id="signupEmail" placeholder="Email" required>
                    <input type="text" id="signupUsername" placeholder="Username" required>
                    
                    <select id="signupRole" required>
                        <option value="">Select Your Role</option>
                        <option value="Rainbow Girl">Rainbow Girl</option>
                        <option value="Grand Officer">Grand Officer</option>
                        <option value="Mother Advisor">Mother Advisor</option>
                        <option value="Advisory Board">Advisory Board Member</option>
                        <option value="Supreme Officer">Supreme Officer</option>
                        <option value="Past Grand Officer">Past Grand Officer</option>
                        <option value="Visitor">Visitor</option>
                    </select>
                    
                    <input type="password" id="signupPassword" placeholder="Password" required>
                    <input type="password" id="signupConfirmPassword" placeholder="Confirm Password" required>
                    
                    <button type="submit" class="btn-primary">Create Account</button>
                </form>
                <p class="switch-form">
                    Already have an account? 
                    <a href="#" onclick="showLogin(); return false;">Sign In</a>
                </p>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        function showSignup() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('signupForm').style.display = 'block';
        }
        
        function showLogin() {
            document.getElementById('signupForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
        }
        
        function handleLogin(event) {
            event.preventDefault();
            console.log('Login form submitted');
            
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            if (login(username, password)) {
                console.log('Login successful');
                
                // Check if user needs training
                if (needsTraining()) {
                    console.log('New user - redirecting to welcome tutorial...');
                    window.location.href = 'welcome-tutorial.html';
                } else {
                    console.log('Returning user - redirecting to index...');
                    window.location.href = 'index.html';
                }
            } else {
                alert('Invalid username or password');
            }
        }
        
        async function handleSignup(event) {
            event.preventDefault();
            console.log('Signup form submitted');
            
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const username = document.getElementById('signupUsername').value;
            const role = document.getElementById('signupRole').value;
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('signupConfirmPassword').value;
            
            if (password !== confirmPassword) {
                alert('Passwords do not match!');
                return;
            }
            
            if (password.length < 6) {
                alert('Password must be at least 6 characters long!');
                return;
            }
            
            console.log('Calling signUp function...');
            const success = await signUp(username, email, name, role, password);
            
            if (success) {
                console.log('Signup successful - NEW USER - redirecting to welcome tutorial...');
                window.location.href = 'welcome-tutorial.html';
            }
        }

        // If already logged in, check if they need training
        if (isLoggedIn()) {
            if (needsTraining()) {
                console.log('User logged in but needs training...');
                window.location.href = 'welcome-tutorial.html';
            } else {
                console.log('User already logged in, redirecting to index...');
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
