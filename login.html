<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NJ Rainbow Convention 2026</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .test-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            background: #4CAF50;
            color: white;
            padding: 15px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            font-size: 14px;
        }
        .test-button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>🎪 NJ Rainbow Convention 2026</h1>
            <p class="tagline">Welcome! Please sign in or create an account.</p>
            
            <!-- Login Form -->
            <div id="loginForm" class="form-container">
                <h2>Sign In</h2>
                <form onsubmit="handleLogin(event)">
                    <input type="text" id="loginUsername" placeholder="Username or Email" required>
                    <input type="password" id="loginPassword" placeholder="Password" required>
                    <button type="submit" class="btn-primary">Sign In</button>
                </form>
                <p class="switch-form">
                    Don't have an account? 
                    <a href="#" onclick="showSignup(); return false;">Create Account</a>
                </p>
            </div>
            
            <!-- Signup Form (Hidden by default) -->
            <div id="signupForm" class="form-container" style="display: none;">
                <h2>Create Account</h2>
                <form onsubmit="handleSignup(event)">
                    <input type="text" id="signupName" placeholder="Full Name" required>
                    <input type="email" id="signupEmail" placeholder="Email" required>
                    <input type="text" id="signupUsername" placeholder="Username" required>
                    
                    <select id="signupRole" required>
                        <option value="">Select Your Role</option>
                        <option value="Rainbow Girl">Rainbow Girl</option>
                        <option value="Grand Officer">Grand Officer</option>
                        <option value="Mother Advisor">Mother Advisor</option>
                        <option value="Advisory Board">Advisory Board Member</option>
                        <option value="Supreme Officer">Supreme Officer</option>
                        <option value="Past Grand Officer">Past Grand Officer</option>
                        <option value="Visitor">Visitor</option>
                    </select>
                    
                    <input type="password" id="signupPassword" placeholder="Password" required>
                    <input type="password" id="signupConfirmPassword" placeholder="Confirm Password" required>
                    
                    <button type="submit" class="btn-primary">Create Account</button>
                </form>
                <p class="switch-form">
                    Already have an account? 
                    <a href="#" onclick="showLogin(); return false;">Sign In</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Test Button -->
    <button onclick="testDirectPost()" class="test-button">
        🧪 Test Form Submit
    </button>

    <script src="auth.js"></script>
    <script>
        // Show/Hide Forms
        function showSignup() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('signupForm').style.display = 'block';
        }
        
        function showLogin() {
            document.getElementById('signupForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
        }
        
        // Handle Login
        function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            if (login(username, password)) {
                window.location.href = 'home.html';
            } else {
                alert('Invalid username or password');
            }
        }
        
        // Handle Signup
        async function handleSignup(event) {
            event.preventDefault();
            
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const username = document.getElementById('signupUsername').value;
            const role = document.getElementById('signupRole').value;
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('signupConfirmPassword').value;
            
            // Validate password match
            if (password !== confirmPassword) {
                alert('Passwords do not match!');
                return;
            }
            
            // Validate password strength
            if (password.length < 6) {
                alert('Password must be at least 6 characters long!');
                return;
            }
            
            console.log('📝 Form submitted, calling signUp function...');
            
            const success = await signUp(username, email, name, role, password);
            
            if (success) {
                console.log('✅ Signup completed, redirecting to home...');
                window.location.href = 'home.html';
            } else {
                console.error('❌ Signup failed');
            }
        }

        // Test form submission (bypasses CORS)
        function testDirectPost() {
            console.log('🧪 Testing form submission...');
            
            const SCRIPT_URL = 'https://script.google.com/a/moor.cc/macros/s/AKfycbwjIdyY8BPVOvhwGUfGKdcWIoaLOm-m__PDPq5mkOlXSlbTAdj292k-DzCRYjvoPYU/exec';
            
            const testData = {
                action: 'saveUser',
                userId: 'form_test_' + Date.now(),
                username: 'formtest',
                email: 'form@test.com',
                name: 'Form Test User',
                role: 'Rainbow Girl',
                password: 'test123',
                dateCreated: new Date().toISOString()
            };
            
            console.log('📤 Creating form with data:', testData);
            
            // Create form
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = SCRIPT_URL;
            form.target = '_blank';
            
            // Add fields
            Object.keys(testData).forEach(key => {
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = key;
                input.value = testData[key];
                form.appendChild(input);
            });
            
            document.body.appendChild(form);
            console.log('📤 Submitting form...');
            form.submit();
            document.body.removeChild(form);
            
            console.log('✅ Form submitted!');
            alert('✅ Test form submitted!\n\nA new tab will open showing the response.\n\nCheck:\n1. The new tab for success message\n2. Apps Script → Executions for logs\n3. Your Google Sheet for the new test user');
        }

        // Check if already logged in
        if (isLoggedIn()) {
            window.location.href = 'home.html';
        }
    </script>
</body>
</html>
